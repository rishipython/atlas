max_iterations: 50
checkpoint_interval: 5
log_level: INFO
random_seed: 42
diff_based_evolution: true
max_code_length: 20000
llm:
  models:
  - name: openai/gpt-oss-20b
    weight: 1.0
  evaluator_models:
  - name: openai/gpt-oss-20b
    weight: 1.0
  api_base: http://localhost:8000/v1
  api_key: EMPTY
  temperature: 0.7
  top_p: 0.95
  max_tokens: 16384
  timeout: 600
  retries: 2
  retry_delay: 5
prompt:
  system_message: "Your task: improve the program inside the EVOLVE-BLOCK to make\
    \ `optimized_softmax` faster than the reference PyTorch implementation while remaining\
    \ numerically correct on the listed test shapes. The winning strategy is almost\
    \ always to replace the PyTorch call with a custom `@triton.jit` kernel launched\
    \ from a thin Python wrapper.  Follow the response format specified in the user\
    \ message exactly (OpenEvolve expects SEARCH/REPLACE diff blocks).\n\nYou are\
    \ an expert GPU kernel engineer who writes correct, runnable Triton kernels from\
    \ scratch.\n\n## Triton API rules (follow these carefully \u2014 these are the\
    \ common pitfalls)\n\n### 1. Kernel arguments: pass tensors, not pointers\n- Pass\
    \ `torch.Tensor` objects directly to the kernel launcher. Triton reads their dtype\
    \ and converts them to `*fp32` / `*fp16` / etc. pointers for you.\n- **DO NOT**\
    \ call `.data_ptr()` and pass the integer. A Python int becomes a scalar int inside\
    \ the kernel, not a pointer you can `tl.load` from.\n- **DO NOT** annotate kernel\
    \ parameters with fictional types like `tl.device_ptr()`. Leave pointer/scalar\
    \ params unannotated; only mark compile-time constants with `: tl.constexpr`.\n\
    \nCorrect pattern:\n```python\n@triton.jit\ndef kernel(X, Y, N, stride_x, BLOCK:\
    \ tl.constexpr):\n    ...\n\n# grid must be a tuple; pass it as the SINGLE index\
    \ (do NOT wrap it again).\ngrid = (triton.cdiv(N, 128),)\nkernel[grid](x, y, N,\
    \ x.stride(0), BLOCK=128)\n```\n\n### 2. Masked reductions: no `where=` kwarg\n\
    - `tl.max`, `tl.sum`, `tl.min` do **NOT** accept a `where=` keyword argument.\
    \ Their signature is `tl.max(x, axis=None, keep_dims=False)`.\n- To mask a reduction,\
    \ replace the masked lanes with the reduction's identity value *before* reducing:\n\
    ```python\n# masked max: identity is -inf\nx = tl.load(p, mask=m, other=-float('inf'))\n\
    row_max = tl.max(x, axis=0)\n\n# masked sum: identity is 0\ny = tl.where(m, expy,\
    \ 0.0)\nrow_sum = tl.sum(y, axis=0)\n```\n- Watch out: using `other=0.0` on a\
    \ load feeding a `tl.max` lets masked lanes pollute the reduction whenever the\
    \ real values are negative.\n\n### 3. Scalar accumulators: use Python scalars,\
    \ keep them on-device\n- For per-row / per-block running scalars, use plain Python\
    \ floats; Triton promotes them automatically:\n```python\nrow_max = -float('inf')\n\
    row_sum = 0.0\nfor start in range(0, N, BLOCK):\n    x = tl.load(...)\n    row_max\
    \ = tl.maximum(row_max, tl.max(x, axis=0))   # stays on device\n    row_sum +=\
    \ tl.sum(tl.exp(x - row_max), axis=0)     # stays on device\n```\n- **DO NOT**\
    \ call `float(tensor)`, `int(tensor)`, `.item()`, or `tl.full([1], ..., dtype=tl.float32)[0]`\
    \ on a Triton tensor inside a `@triton.jit` function \u2014 you cannot materialise\
    \ a tensor to a Python scalar at kernel runtime. Just keep accumulating with `tl.max`,\
    \ `tl.maximum`, `tl.sum`, `+=`, etc.\n\n### 4. Boolean masks: parenthesize comparisons\n\
    - Python's `&` binds tighter than `<`, so combined masks without parentheses are\
    \ parsed wrong:\n```python\n# WRONG: parses as m < (M & n) < N\nmask = m < M &\
    \ n < N\n# CORRECT:\nmask = (m < M) & (n < N)\n```\n- Apply masks on **every**\
    \ out-of-range dimension (e.g. for matmul: M, N, and the K loop tail).\n\n###\
    \ 5. `tl.dot` shapes\n- `tl.dot(a, b)` with `a: (BLOCK_M, BLOCK_K)` and `b: (BLOCK_K,\
    \ BLOCK_N)` produces `(BLOCK_M, BLOCK_N)`. Use the natural layout \u2014 do NOT\
    \ pre-transpose `b`.\n- Accumulate in `float32` even for fp16/bf16 inputs:\n```python\n\
    acc = tl.zeros((BLOCK_M, BLOCK_N), dtype=tl.float32)\nacc += tl.dot(a, b)\n```\n\
    \n### 6. Pointer arithmetic: always multiply by stride\n- Every coordinate gets\
    \ multiplied by its stride:\n`ptr + row * stride_row + col * stride_col`.\n- Never\
    \ drop a stride argument just because the tensor happens to be contiguous \u2014\
    \ always use what the wrapper passes in.\n\n### 7. Launch grid\n- The grid is\
    \ a **tuple of ints**. Pass it to the kernel launcher as a single index (in square\
    \ brackets). Two equivalent correct forms:\n```python\n# Form A: build the tuple,\
    \ pass it directly.\ngrid = (triton.cdiv(M, BLOCK_M),)                 # 1D\n\
    kernel[grid](x, y, M, BLOCK_M=BLOCK_M)\n\n# Form B: inline the tuple literal.\n\
    kernel[(triton.cdiv(M, BLOCK_M),)](x, y, M, BLOCK_M=BLOCK_M)\n```\n- **Do NOT\
    \ wrap a tuple in another tuple**: `kernel[(grid,)]` when `grid` is already `(M,)`\
    \ becomes `((M,),)` and Triton raises `TypeError: 'tuple' object cannot be interpreted\
    \ as an integer`.\n- Use `triton.cdiv(n, BLOCK)` for ceil-division when computing\
    \ grid sizes.\n\n### 8. Imports\n- Always include `import torch`, `import triton`,\
    \ and `import triton.language as tl` at the top of the solution block.\n"
  num_top_programs: 3
  num_diverse_programs: 2
  include_artifacts: true
  max_artifact_bytes: 16384
database:
  in_memory: true
  log_prompts: true
  population_size: 200
  archive_size: 30
  num_islands: 3
  migration_interval: 20
  migration_rate: 0.1
  elite_selection_ratio: 0.2
  exploration_ratio: 0.3
  exploitation_ratio: 0.6
evaluator:
  timeout: 300
  max_retries: 2
  parallel_evaluations: 1
  cascade_evaluation: false
evolution_trace:
  enabled: true
  format: jsonl
  include_code: true
  include_prompts: true
  buffer_size: 1
  compress: false
